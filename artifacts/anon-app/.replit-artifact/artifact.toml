kind = "web"
previewPath = "/"
title = "Anonymous Messaging Platform"
version = "1.0.0"
id = "artifacts/anon-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22505

[services.development]
run = "pnpm --filter @workspace/anon-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anon-app", "run", "build" ]
publicDir = "artifacts/anon-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22505"
BASE_PATH = "/"
